  function hidePanel() { panel.style.display = 'none'; }

  function showPanel(d) {
    var html = '<div class=\'sc-panel-title\'>' + d.n + ' facilit' + (d.n===1?'y':'ies') + '  ·  ' + d.val + '</div>';
    if (d.minerals) html += '<div class=\'sc-row\'><span class=\'sc-type\'>Minerals</span><span>' + d.minerals + '</span></div>';
    if (d.types)    html += '<div class=\'sc-row\'><span class=\'sc-type\'>Facilities</span><span>' + d.types + '</span></div>';
    if (d.ops)      html += '<div class=\'sc-row\'><span class=\'sc-type\'>Operators</span><span>' + d.ops + '</span></div>';
    if (d.ports)    html += '<div class=\'sc-row\'><span class=\'sc-type\'>Exports via</span><span>' + d.ports + '</span></div>';
    panel.innerHTML = html;
    panel.style.display = 'block';
  }

  // View-switch buttons: fix trace opacity + reset any per-point marker.opacity
  gd.on('plotly_buttonclicked', function(data) {
    if (!data || !data.button) return;
    var op = OP[data.button.label];
    if (op) {
      setTimeout(function() {
        var tIdxs = gd.data.map(function(_, i) { return i; });
        Plotly.restyle(gd, {opacity: op}, tIdxs);
        // Reset per-point marker opacity + clear cluster edge trace
        Object.values(FAC_IDXS).forEach(function(tIdx) {
          Plotly.restyle(gd, {'marker.opacity': 1}, [tIdx]);
        });
        Plotly.restyle(gd, {lat: [[]], lon: [[]]}, [CLUST_EDGE_IDX]);
      }, 80);
    }
    hidePanel();
  });

  gd.on('plotly_click', function(data) {
    if (!data || !data.points || !data.points.length) return;
    var pt = data.points[0];
    var evt = data.event;

  // Helper: restyle all traces then relayout
  function restyleThenLayout(traceAttrs, layoutArgs) {
    var tIdxs = gd.data.map(function(_, i) { return i; });
    return Plotly.restyle(gd, traceAttrs, tIdxs)
      .then(function() { return Plotly.relayout(gd, layoutArgs); });
  }

    // ── Cluster click: show only this cluster's facilities + edges ───────

      var key = pt.lat.toFixed(2) + ',' + pt.lon.toFixed(2);
      var d = CLUST_DATA[key];
      if (d) showPanel(d);
      var lat = pt.lat, lon = pt.lon, span = 2.5;
      var trPts = (d && d.trace_pts) || {};

      // Build visibility: VIS_DOM base, but hide all domestic edges

      var newVis = VIS_DOM.slice();
      DOM_IDXS.forEach(function(i) { newVis[i] = false; });

      newVis[CLUST_IDX]      = false;

      // Load cluster edge data into placeholder trace
      var edgeLats = (d && d.edge_lats) || [];
      var edgeLons = (d && d.edge_lons) || [];
      Plotly.restyle(gd, {lat: [edgeLats], lon: [edgeLons]}, [CLUST_EDGE_IDX]);

      var tIdxs = gd.data.map(function(_, i) { return i; });
      Plotly.restyle(gd, {visible: newVis, showlegend: SL_DOM, opacity: OP_DOM}, tIdxs)
        .then(function() { return Plotly.relayout(gd, {
          'geo.center.lat': lat, 'geo.center.lon': lon,
          'geo.lataxis.range': [lat-span, lat+span],
          'geo.lonaxis.range': [lon-span, lon+span]
        }); })
        .then(function() {
          // Per-point opacity: only cluster facilities visible
          var restyles = [];
          Object.keys(FAC_IDXS).forEach(function(ftype) {
            var tIdx  = FAC_IDXS[ftype];
            var nPts  = FAC_NPTS[ftype];
            var clIdx = trPts[ftype] || [];
            var opArr = new Array(nPts).fill(0.04);
            clIdx.forEach(function(i) { opArr[i] = 0.92; });
            restyles.push(Plotly.restyle(gd, {'marker.opacity': [opArr]}, [tIdx]));

          return Promise.all(restyles);

      return;

    // ── Continent arc click → drill down to country arcs ──────────────
